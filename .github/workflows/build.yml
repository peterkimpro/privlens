name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Job 0: Fast static lint — catches NSLock-in-async, missing imports, unguarded
  # platform APIs WITHOUT waiting for a full Swift build.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Swift concurrency & Linux lint
        run: bash Scripts/lint-swift-concurrency.sh

  # Job 1: Linux SPM build — validates PrivlensCore cross-platform stubs
  linux-spm:
    needs: lint
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4

      - name: Build PrivlensCore (Linux)
        run: swift build --target PrivlensCore

      - name: Run Unit Tests (Linux)
        run: swift test

  # Job 2: macOS full build + iOS Simulator tests
  ios-build:
    needs: lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build PrivlensCore (SPM)
        run: swift build --target PrivlensCore

      - name: Build full app (iOS Simulator)
        run: |
          xcodebuild build \
            -scheme Privlens \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20

      - name: Run Tests
        run: |
          xcodebuild test \
            -scheme Privlens \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            | tail -30
