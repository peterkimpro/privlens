name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  spm-build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build PrivlensCore (SPM)
        run: swift build --target PrivlensCore

      - name: Build full app (iOS Simulator)
        run: |
          xcodebuild build \
            -scheme Privlens \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20

      - name: Run Tests
        run: |
          xcodebuild test \
            -scheme Privlens \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            | tail -30
